---
# yamllint disable rule:line-length
###############################################################################
# Whisparr Role Options
###############################################################################
# Whisparr uses generic Servarr installation scripts.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/Servarr/Wiki/blob/master/servarr
# * https://github.com/Whisparr/Whisparr/releases
# * https://github.com/Servarr/Wiki/blob/master/servarr/servarr-install-script.sh
# yamllint enable rule:line-length

whisparr___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-23',
    _debian='trixie',
    _app='v2.2.0-release.108',
    _script_release='3.0.12',
    _script_date='2024-04-09',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

whisparr___packages:
  - 'sqlite3'  # Whisparr DB.
  - 'gnupg2'  # GPG for certificates.
  - 'ca-certificates'  # Up to date certificates for certificate validation.
  - 'libicu76'  # International Unicode support for .NET.

  # Ansible.
  - 'xz-utils'  # xz archives.
  - 'rsync'  # ansible.posix.synchronize.

###############################################################################
# Whisparr GitHub Options
###############################################################################
# Reference:
# * https://github.com/Whisparr/Whisparr/releases/latest

whisparr___repo_url:
  'https://github.com/Whisparr/Whisparr/releases/download/'
whisparr___package:
  '{{ "Whisparr." ~ whisparr___release._app [1:] ~ ".linux-x64.tar.gz" }}'

whisparr___app: "{{ {} | r_pufky.data.v3(

    _version=whisparr___release._app,
    _package=whisparr___package,
    _var_dir='/var/opt/whisparr',
    _cfg='/var/opt/whisparr/config.xml',
    _opt_dir='/opt/whisparr',
    _src_dir='/opt/whisparr/src',
    _app='/opt/whisparr/src/' ~ whisparr___release._app,
    _service='/etc/systemd/system/whisparr.service',
    _base_url=whisparr___repo_url,
    _url=(
      whisparr___repo_url ~ whisparr___release._app ~ '/' ~ whisparr___package
    ),
  ) }}"

###############################################################################
# Default Whisparr User/Group
###############################################################################

whisparr___group:
  name: 'media'
  gid: 5555

whisparr___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
